[package]
name = "sos-repro"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "SOS Reproducibility Engine (the Nix analogy): hermetic environment locks with itemized drift detection, the level-aware reproduction contract (L3 bit-exact / L2 within-certificate / L1 in-distribution / L0 replay), and rerun that re-realizes a workflow under a pinned lock. Pure Rust, no FFI."
keywords = ["reproducibility", "lockfile", "determinism", "provenance", "science"]
categories = ["science", "data-structures"]

[dependencies]
sos-core = { workspace = true }
sos-workflow = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
sos-store = { workspace = true }
serde_json = { workspace = true }
