[package]
name = "sos-curiosity"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "SOS Curiosity Engine (deterministic core): the OS idle-loop that generates ranked scientific questions by scanning the knowledge graph (contradictions, under-connection, unsupported claims). Integer/fixed-point scoring, every question carries a derivation. LLM-free, pure Rust, no FFI."
keywords = ["curiosity", "questions", "discovery", "deterministic", "science"]
categories = ["science", "data-structures"]

[dependencies]
sos-core = { workspace = true }
sos-knowledge = { workspace = true }
sos-reasoning = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
sos-store = { workspace = true }
serde_json = { workspace = true }
