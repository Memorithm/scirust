[package]
name = "scirust-sciagent"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.85"
description = "SCIAGENT — SLM deterministe entraine from scratch, specialise Rust + agentique, infere via scirust/CCOS/SLHAv2"

[dependencies]
scirust-core = { path = "../scirust-core" }
scirust-autodiff = { path = "../scirust-autodiff" }
scirust-gpu = { path = "../scirust-gpu", optional = true }
scirust-cuda = { path = "../scirust-cuda", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"
clap = { version = "4", features = ["derive"] }
ureq = { version = "2", features = ["json"], optional = true }
# SHA-256 to verify downloaded crate tarballs against the crates.io checksum
# (supply-chain integrity, audit finding S3). Only needed by the `fetch` binary.
sha2 = { version = "0.10", optional = true }
# Rust parser — the `syn`-parse quality metric in the `cuda_eval` harness (how many
# generated samples are syntactically valid Rust). Pure-Rust, no C deps, but only
# pulled by the `eval` feature so the default/CI builds stay lean.
syn = { version = "2", features = ["full", "parsing"], optional = true }

[dev-dependencies]
approx = "0.5"

[features]
default = []
# HTTP fetching for the data-collection binary only. Off by default so the
# workspace stays pure-Rust: `ureq` pulls `ring`, whose build script needs a C
# cross-compiler — which breaks the linker-less aarch64 `cargo check` CI job.
fetch = ["dep:ureq", "dep:sha2"]
# GPU-accelerated matmuls (Vulkan/Metal/DX12/GL via wgpu). Attaches scirust-gpu's
# validated `WgpuEngine` to the model's tape and flips it into GPU-matmul mode, so
# every projection / attention-score / SwiGLU / tied-LM-head GEMM runs its forward
# and backward on the device. Off by default: it pulls `wgpu` (and a device at
# runtime), which the pure-Rust default build and the aarch64 check must not need.
gpu = ["dep:scirust-gpu", "scirust-gpu/wgpu"]
# Route B: the bf16 + Tensor-core CUDA backend (Jetson Thor). Pulls scirust-cuda's
# CudaChain and runs the whole resident forward on Tensor cores. Off by default and
# Thor-only to build (needs the CUDA toolkit); parity vs the CPU model is checked
# at bf16 tolerance in tests/cuda_parity.rs.
cuda = ["dep:scirust-cuda", "scirust-cuda/cuda"]
# Route B quality-evaluation harness (`cuda_eval`): CUDA generation + `syn`-parse
# scoring of the generated Rust. Enables `cuda` and pulls `syn`. Opt-in so a plain
# `--features cuda` build/test doesn't compile `syn`.
eval = ["cuda", "dep:syn"]

[[bin]]
name = "fetch-crates"
path = "src/bin/fetch-crates.rs"
required-features = ["fetch"]

[[example]]
name = "gpu_forward_parity"
required-features = ["gpu"]

[[example]]
name = "resident_train"
required-features = ["gpu"]

[[example]]
name = "resident_pretrain"
required-features = ["gpu"]

[[example]]
name = "resident_lora_finetune"
required-features = ["gpu"]

# These resident examples use the `gpu` module (ResidentModel), so they must be
# gated behind the `gpu` feature — otherwise `cargo test/build --features cuda`
# (no `gpu`) tries to compile them and fails on the `scirust_sciagent::gpu` import.
[[example]]
name = "resident_generate"
required-features = ["gpu"]

[[example]]
name = "resident_infer_bench"
required-features = ["gpu"]

[[example]]
name = "resident_repl"
required-features = ["gpu"]

[[example]]
name = "resident_spec_bench"
required-features = ["gpu"]

# Route B forward-throughput bench needs both backends (wgpu + CUDA) to compare.
[[example]]
name = "cuda_forward_bench"
required-features = ["gpu", "cuda"]

# Route B training-throughput bench (full AdamW step) — both backends to compare.
[[example]]
name = "cuda_train_bench"
required-features = ["gpu", "cuda"]

# Route B production pretraining harness — CUDA-only (no wgpu/gpu needed).
[[example]]
name = "cuda_pretrain"
required-features = ["cuda"]

# Route B generation from a trained checkpoint — CUDA-only.
[[example]]
name = "cuda_generate"
required-features = ["cuda"]

# Route B checkpoint quality evaluation — CUDA generation + `syn`-parse scoring.
[[example]]
name = "cuda_eval"
required-features = ["eval"]
