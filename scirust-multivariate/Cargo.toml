[package]
name = "scirust-multivariate"
version = "0.1.0"
edition = "2021"
description = "Multivariate pattern detection: PCA, ICA, clustering, Mahalanobis distance"
license = "PolyForm-Noncommercial-1.0.0"

[dependencies]
scirust-core = { path = "../scirust-core" }
# Robust per-coordinate statistics (median/MAD/IQR) for the fitted scalers in
# `robust_geometry` — reused, not re-implemented (SRCC program, phase 722).
scirust-stats = { path = "../scirust-stats" }
# SI dimension metadata for the `FeatureDescriptor` units boundary.
scirust-units = { path = "../scirust-units" }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
rand = "0.8"
serde_json = "1"
