name: CI

# Gates are the same commands documented in README.md / CLAUDE workflow:
# they must stay runnable locally with identical results.
#
# Deliberately NOT using `--all-features`: in scirust-core the features
# `blas-openblas` and `blas-mkl` are mutually exclusive backends of
# blas-src and require system toolchains the runners do not have —
# `--all-features` can never build. Feature-specific paths are exercised by
# dedicated jobs with the toolchain and system setup they require.

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege for the automatically-provided GITHUB_TOKEN. None of the CI
# jobs write back to the repository — they only read the checked-out code and
# (for the coverage/SBOM jobs) upload artifacts / hit external services with
# their own tokens. Declaring `contents: read` at the top level drops every
# job to read-only regardless of the repository/organization default token
# scope, so a compromised action step cannot push code, open PRs, or mutate
# releases. Any future job that legitimately needs more must opt in with its
# own job-level `permissions:` block.
permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # rustfmt output is version-sensitive and this repo's rustfmt.toml uses
      # unstable options, so the toolchain must be nightly. Pin it to a fixed
      # nightly (rather than the floating `@nightly`) so a new nightly rustfmt
      # release cannot silently reformat already-merged code and turn every
      # open PR's Format Check red. Bump this date deliberately, re-running
      # `cargo +nightly-<date> fmt --all` in the same commit.
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly-2026-07-02 fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run clippy
        run: cargo +nightly-2026-07-02 clippy --workspace --all-targets --locked -- -D warnings
      - name: Run clippy (scirust-gpu wgpu feature)
        run: cargo +nightly-2026-07-02 clippy -p scirust-gpu --features wgpu --all-targets --locked -- -D warnings
      - name: Run clippy (scirust-sim rl feature)
        run: cargo +nightly-2026-07-02 clippy -p scirust-sim --features rl --all-targets --locked -- -D warnings
      - name: Run clippy (scirust-sim stiff feature)
        run: cargo +nightly-2026-07-02 clippy -p scirust-sim --features stiff --all-targets --locked -- -D warnings
      - name: Run clippy (scirust-biomed sim feature)
        run: cargo +nightly-2026-07-02 clippy -p scirust-biomed --features sim --all-targets --locked -- -D warnings

  # Gate σ (S2 de paper/PAPER_PLAN.md) : échoue si une garde f32 sous
  # σ_sanitized (= f32::MIN_POSITIVE) subsiste hors test dans scirust-gpu/src
  # — une telle garde est morte sur la voie sanitized (sanitize_f32 l'écrase).
  # Ambiguïtés f32/f64 = WARNING non bloquant (zéro faux positif).
  epsilon-audit:
    name: Epsilon Audit (σ gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run epsilon-audit --check
        run: cargo +nightly-2026-07-02 run --locked -q -p scirust-sigma --bin epsilon-audit -- --root . --check

  # Tamper-evidence gate for the validated public COBOL reference corpus
  # (external/cobol-reference/selected). Verifies every file against its SHA-256
  # manifest and that the recorded GnuCOBOL exit codes (0) and intentional
  # warning counts (7/8) are preserved. Coreutils only — no toolchain needed.
  cobol-corpus:
    name: COBOL Corpus Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify COBOL reference corpus
        run: ./scripts/verify-cobol-corpus.sh

  # Compiler-derived equivalence gate for the six scirust-finmigrate units.
  # Pinned to ubuntu-22.04 because that image ships GnuCOBOL 3.1.2 — the exact
  # version recorded in metadata/compiler-version.txt — so `verify` reproduces
  # the committed baselines byte-for-byte against a live compiler. `check` needs
  # no compiler and is version-independent. Both the deterministic driver and
  # these commands are documented in the unit's REPRODUCE.md and stay runnable
  # locally with identical results.
  finmigrate-compiler:
    name: finmigrate GnuCOBOL Equivalence
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: scirust-finmigrate/tests/compiler-derived/gnucobol-3.1.2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install GnuCOBOL 3.1.2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnucobol
          cobc --version
      - name: Verify integrity manifest (SHA-256)
        run: sha256sum -c SHA256SUMS
      - name: Model-equivalence check (no compiler; version-independent)
        run: python3 tools/run_baselines.py check
      - name: Reproduce baselines vs live GnuCOBOL (verify)
        run: python3 tools/run_baselines.py verify

  build-test:
    name: Build & Test (nightly, x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build workspace
        run: cargo +nightly-2026-07-02 build --workspace --all-targets --locked
      - name: Run tests
        run: cargo +nightly-2026-07-02 test --workspace --locked

  # The optional nightly `portable-simd` feature must keep building and
  # testing warning-clean (RUSTFLAGS=-D warnings is set workspace-wide above).
  portable-simd:
    name: Build & Test (portable-simd, nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build & test scirust-simd with portable-simd
        run: cargo +nightly-2026-07-02 test -p scirust-simd --all-targets --features portable-simd --locked

  # AMX, SVE/SME and the ARM dot-product paths use APIs that are not all
  # available at the stable MSRV. Keep their compilation and tests pinned to
  # nightly while the default scirust-simd build remains MSRV-compatible.
  nightly-simd:
    name: Build & Test (nightly SIMD extensions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build & test unstable architecture extensions
        run: cargo +nightly-2026-07-02 test -p scirust-simd --all-targets --features nightly-simd --locked

  # The whole workspace must also build and pass on STABLE Rust (the
  # `portable-simd` and `nightly-simd` features are optional and off by default) —
  # this is the gate industrial consumers care about.
  build-test-stable:
    name: Build & Test (stable, x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build workspace (stable)
        run: cargo +stable build --workspace --all-targets --locked
      - name: Run tests (stable)
        run: cargo +stable test --workspace --locked
      # The `rl` feature is off by default (it pulls scirust-learning), so the
      # workspace test run above does not exercise the scirust-sim ↔
      # scirust-learning RL bridge. Cover it explicitly, mirroring the
      # portable-simd / wgpu feature jobs.
      - name: Test scirust-sim rl bridge (rl feature)
        run: cargo +stable test -p scirust-sim --features rl --locked
      # The `stiff` feature pulls scirust-stiff and adds the stiff_bridge
      # (Robertson kinetics). Cover it explicitly like the rl feature.
      - name: Test scirust-sim stiff bridge (stiff feature)
        run: cargo +stable test -p scirust-sim --features stiff --locked
      # The scirust-biomed `sim` feature exposes its glucose plant as a
      # scirust_sim::System; the default workspace run does not build it.
      - name: Test scirust-biomed sim bridge (sim feature)
        run: cargo +stable test -p scirust-biomed --features sim --locked

      - name: Check OpenClaw demo feature
        run: cargo +stable check -p scirust --bin openclaw-u --features openclaw --locked

  msrv:
    name: Check (MSRV 1.89.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install exact MSRV
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.89.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check workspace at the declared MSRV
        run: cargo +1.89.0 check --workspace --all-targets --locked

  platform-check:
    name: Check (${{ matrix.os }}, stable)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check all workspace targets
        run: cargo +stable check --workspace --all-targets --locked

  opt-in-features:
    name: Check opt-in network features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check trader live HTTP path
        run: cargo +stable check -p scirust-trader --features live --all-targets --locked
      - name: Check RSI Anthropic path
        run: cargo +stable check -p scirust-rsi --features anthropic --all-targets --locked
      - name: Check SciAgent fetch path
        run: cargo +stable check -p scirust-sciagent --features fetch --all-targets --locked

  # Type-checks every cfg(target_arch = "aarch64") path (NEON/SVE backends),
  # including the nightly-only SVE/SME and dot-product extensions.
  # A pure `cargo check` needs no cross linker and would have caught the
  # 2026-06-12 sgemv merge regression on the NEON side.
  # Additionally EXECUTES the portable-f32 cross-platform proof on aarch64
  # under qemu-user: qemu faithfully implements IEEE-754 arithmetic, so a
  # PASS here is a real x86↔ARM bit-exactness check on every CI run
  # (docs/TEST_PROTOCOL.md, « Cross-platform proof »; native legs: Jetson +
  # x86_64 Debian, LIVESTATE volet 112).
  cross-check-aarch64:
    name: Cross-check (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
          targets: aarch64-unknown-linux-gnu
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check workspace for aarch64
        run: cargo +nightly-2026-07-02 check --workspace --all-targets --features scirust-simd/nightly-simd --locked --target aarch64-unknown-linux-gnu
      - name: Install qemu-user + aarch64 cross toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user gcc-aarch64-linux-gnu
      - name: Run portable-f32 proof on aarch64 (qemu)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER: qemu-aarch64 -L /usr/aarch64-linux-gnu
        run: |
          cargo +nightly-2026-07-02 test -p scirust-core --lib portable_f32 --release --locked --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 test -p scirust-core --lib lowprec --release --locked --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 test -p scirust-core --lib tree_allreduce --release --locked --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 test -p scirust-core --lib formal_proof --release --locked --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 run --release --locked -p scirust-core --bin proof_portable_f32 --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 run --release --locked -p scirust-core --bin proof_portable_training --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 run --release --locked -p scirust-core --bin proof_lowprec_training --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 run --release --locked -p scirust-core --bin proof_fp8_training --target aarch64-unknown-linux-gnu
          cargo +nightly-2026-07-02 run --release --locked -p scirust-core --bin proof_formal_bounds --target aarch64-unknown-linux-gnu

  deny:
    name: License & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Audit default dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          arguments: --locked --workspace
      - name: Audit trader live dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-trader/Cargo.toml
          arguments: --locked --no-default-features --features live
      - name: Audit RSI Anthropic dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-rsi/Cargo.toml
          arguments: --locked --no-default-features --features anthropic
      - name: Audit SciAgent fetch dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-sciagent/Cargo.toml
          arguments: --locked --no-default-features --features fetch
      - name: Audit wgpu dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-gpu/Cargo.toml
          arguments: --locked --no-default-features --features wgpu
      - name: Audit CUDA dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-gpu/Cargo.toml
          arguments: --locked --no-default-features --features cuda
      - name: Audit OpenBLAS dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-core/Cargo.toml
          arguments: --locked --no-default-features --features blas-openblas
      - name: Audit MKL dependency graph
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: stable
          manifest-path: scirust-core/Cargo.toml
          arguments: --locked --no-default-features --features blas-mkl

  # Miri exercises the memory-view/allocation regressions in crates that
  # contain unsafe code, then the pure numeric suites.
  miri:
    name: Miri (memory safety and numeric crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain + miri
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
          components: miri
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run targeted unsafe regressions and pure-numeric crates
        # proptest's default failure-persistence backend calls
        # std::env::current_dir() to absolutize its regression-file path —
        # entirely unrelated to the numeric code under test, but Miri's
        # isolation sandbox rejects `getcwd` as unsupported by default,
        # aborting the whole run. `-Zmiri-isolation-error=warn` demotes that
        # specific class of unsupported-operation to a warning (an OS error
        # is returned instead, which proptest already handles by skipping
        # persisted-failure loading) without weakening Miri's actual UB
        # detection for the crates' own in-memory, I/O-free logic.
        env:
          MIRIFLAGS: "-Zmiri-isolation-error=warn"
        run: |
          cargo +nightly-2026-07-02 miri test -p scirust-core --locked matrix::view::tests
          cargo +nightly-2026-07-02 miri test -p scirust-arena --locked aligned::tests
          cargo +nightly-2026-07-02 miri test -p scirust-arena --locked slab::tests
          cargo +nightly-2026-07-02 miri test --locked \
            -p scirust-special -p scirust-stats \
            -p scirust-interp -p scirust-sparse -p scirust-stiff \
            -p scirust-gp -p scirust-units -p scirust-frame -p scirust-forecast \
            -p scirust-sim

  # Informational: build the cargo-fuzz targets for the untrusted-input parsers
  # and smoke-run them for a bounded time. The `fuzz` crate is a separate
  # nightly-only workspace (excluded from the main build). This does not gate
  # merges — bounded fuzzing rarely finds new crashes — but it keeps the fuzz
  # harness building and would surface a crash (e.g. a parser regression) in the
  # job log. Long-running campaigns are run out-of-band.
  fuzz:
    name: Fuzz (untrusted parsers, smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    # cargo-fuzz builds third-party crates (libfuzzer-sys) and instruments the
    # binary itself; do not impose the workspace-wide `-D warnings`.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-fuzz
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      # The --target is explicit because prebuilt cargo-fuzz binaries are
      # musl-linked and default their build target to their own compile-time
      # platform (x86_64-unknown-linux-musl), where the sanitizer runtime is
      # unavailable ("sanitizer is incompatible with statically linked libc").
      - name: Build fuzz targets
        working-directory: fuzz
        run: cargo +nightly-2026-07-02 fuzz build --target x86_64-unknown-linux-gnu
      - name: Smoke-run QSR1 deserializer fuzzer
        working-directory: fuzz
        run: cargo +nightly-2026-07-02 fuzz run qsr1_from_bytes --target x86_64-unknown-linux-gnu -- -max_total_time=45 -runs=500000
      - name: Smoke-run ONNX JSON importer fuzzer
        working-directory: fuzz
        run: cargo +nightly-2026-07-02 fuzz run import_onnx_json_from_bytes --target x86_64-unknown-linux-gnu -- -max_total_time=45 -runs=500000

  # Real wgpu compute path, validated against the CPU oracle on a software
  # Vulkan adapter (Mesa lavapipe) — no physical GPU required.
  gpu-wgpu:
    name: GPU (wgpu / lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
      - name: Install Mesa lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test wgpu backend on lavapipe
        run: cargo +nightly-2026-07-02 test -p scirust-gpu --features wgpu --locked

  # The CUDA feature uses dynamic loading. Hosted runners have no CUDA runtime,
  # which makes them the right place to enforce the public no-device contract:
  # construction must skip / return Unavailable, never panic in cudarc's loader.
  gpu-cuda-fallback:
    name: GPU (CUDA no-runtime fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test CUDA crates without a local runtime
        run: |
          cargo +stable test -p scirust-cuda --features cuda --locked
          cargo +stable test -p scirust-gpu --features cuda --locked

  # Generate and validate a complete workspace CycloneDX SBOM.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-cyclonedx
      - name: Generate SBOM
        run: ./scripts/generate-sbom.sh
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scirust-sbom-cyclonedx
          path: docs/sbom/scirust.cdx.json

  # Informational: coverage upload depends on external service/token and
  # must not gate merges.
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly-2026-07-02
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-llvm-cov
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Generate coverage
        run: cargo +nightly-2026-07-02 llvm-cov --workspace --locked --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: lcov.info
          fail_ci_if_error: false

