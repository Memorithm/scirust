name: Release

# Publishes a GitHub Release with a reproducible CycloneDX SBOM attached
# whenever a version tag is pushed (e.g. `v0.14.0`). Tagging is a deliberate,
# human action — this workflow only reacts to it.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Gate the release on the same checks CI enforces, so a tag can never
      # ship something that wouldn't pass on master.
      - name: Build & test (workspace)
        run: cargo test --workspace
        env:
          RUSTFLAGS: "-D warnings"

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM
        run: ./scripts/generate-sbom.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            docs/sbom/scirust.cdx.json
