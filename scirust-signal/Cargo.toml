[package]
name = "scirust-signal"
version = "0.1.0"
edition = "2021"
publish = false
description = "SciRust signal processing — FFT, window functions, time/frequency features for industrial monitoring"

[dependencies]
scirust-core = { path = "../scirust-core" }
scirust-estimation = { path = "../scirust-estimation" }
# Reused in radar::vi_cfar's production GO/SO threshold calibration: Gamma's
# tested regularized-incomplete-gamma survival function is exactly the
# reference-half-window survival function Q_n(m) the exact calibration
# integral needs (see the module docs, "Threshold calibration").
scirust-stats = { path = "../scirust-stats" }
# Its adaptive-Simpson/Romberg quadrature (bounded, non-statistical error)
# is what turns the GO/SO calibration integral into a deterministic
# computation instead of Monte-Carlo sampling.
scirust-solvers = { path = "../scirust-solvers" }
# CANR §9 benchmark-record schema, enforced as a type (see that crate's docs):
# vst_bench emits its table as shared BenchRecords in addition to CSV/Markdown.
scirust-bench-schema = { path = "../scirust-bench-schema" }
serde = { version = "1", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
criterion = "0.5"
proptest = "1"
scirust-special = { path = "../scirust-special" }

[[bench]]
name = "vi_cfar_bench"
harness = false
