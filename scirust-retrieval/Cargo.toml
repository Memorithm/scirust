[package]
name = "scirust-retrieval"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
publish = false
description = "SciRust pure semantic (dense transformer) retrieval — deterministic exact index, late-interaction reranking, and ranking metrics; an auditable alternative to RAG"

[dependencies]
scirust-core = { path = "../scirust-core" }
serde = { version = "1", features = ["derive"] }
