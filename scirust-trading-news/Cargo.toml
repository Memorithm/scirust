[package]
name = "scirust-trading-news"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
regex = "1"
async-trait = "0.1"
toml = "0.8"
quick-xml = "0.36"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "macros", "rt", "time"] }
tracing = "0.1"
thiserror = "2"
scirust-trading-core = { path = "../scirust-trading-core" }
