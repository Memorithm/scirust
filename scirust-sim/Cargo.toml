[package]
name = "scirust-sim"
version = "0.1.0"
edition = "2021"
publish = false
description = "Multi-domain simulation environments: a deterministic time-stepping engine (RK4, adaptive Dormand-Prince 5(4), symplectic Euler), a gym-style Environment trait for agent-in-the-loop simulation, and oracle-tested ready-made models across mechanics, orbital dynamics, epidemiology, ecology, chemistry, thermal, electrical, stochastic processes, queueing, pharmacokinetics and rigid-body dynamics. Pure Rust, no unsafe, no dependencies by default."

[features]
# Off by default: the core crate stays zero-dependency (and Miri-clean). With
# `rl` enabled, `scirust-sim`'s environments can be driven by the agents in
# `scirust-learning::rl` through the `rl_bridge::RlEnv` adapter. `rand` is
# pulled only for the feature's Q-learning test.
rl = ["dep:scirust-learning", "dep:rand"]

[dependencies]
scirust-learning = { path = "../scirust-learning", optional = true }
rand = { version = "0.8", optional = true }
