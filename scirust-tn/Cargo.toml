[package]
name = "scirust-tn"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.85"
description = "Tensor Network primitives for SciRust: Tensor-Train decomposition, MPS, DMRG"
license-file = "../LICENSE.md"
repository = "https://github.com/Memorithm/scirust"

[features]
default = []

[dependencies]
nalgebra = "0.33"
scirust-core = { path = "../scirust-core" }

[dev-dependencies]
approx = "0.5"

[lib]
name = "scirust_tn"
path = "src/lib.rs"

[[example]]
name = "transformer_compress"
required-features = []

