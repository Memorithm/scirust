[package]
name = "scirust-srcc"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.89"
authors = ["SciRust Team"]
description = "Deterministic resonant-consensus closure and projection"
license-file = "../LICENSE.md"
repository = "https://github.com/Memorithm/scirust"
homepage = "https://github.com/Memorithm/scirust"
documentation = "https://docs.rs/scirust-srcc"

[features]
default = []

[dependencies]
# Fitted per-coordinate robust scaling for the opt-in scale-aware source
# geometry (SRCC program, phase 723). Fitting only: distance evaluation stays
# in this crate to preserve the frozen fixed-order source-distance body.
scirust-multivariate = { path = "../scirust-multivariate" }
