[workspace]

[package]
name = "benchmarks"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"

[dependencies]
scirust-core = { path = "../../scirust-core" }
scirust-autodiff = { path = "../../scirust-autodiff" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "simd_vs_scalar"
harness = false

[[bench]]
name = "nn_ops"
harness = false

[[bench]]
name = "io_bench"
harness = false
