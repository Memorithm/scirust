# deny.toml — cargo-deny configuration for SciRust (validated with cargo-deny 0.19)
#
# The workspace crates themselves are source-available under
# PolyForm Noncommercial 1.0.0 (see LICENSE.md) and are not published to
# crates.io (`publish = false`), so the license check below covers
# third-party dependencies only.

[graph]
all-features = false

[advisories]
ignore = [
    # Unmaintained notice, not a vulnerability: `paste` is pulled in via
    # nalgebra -> simba and has no upstream replacement yet
    # (https://rustsec.org/advisories/RUSTSEC-2024-0436).
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; transitively required by nalgebra/simba, no safe upgrade available" },
]

[licenses]
# Exactly the permissive licenses present in the dependency tree
# (cargo-deny warns on unused allowances, so keep this list tight).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8
# Workspace members are unpublished; skip license checks for them.
private = { ignore = true }

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
