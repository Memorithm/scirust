[package]
name = "scirust-simd"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.89"
authors = ["SciRust Team"]
description = "SIMD auto-vectorization primitives for SciRust"
license-file = "../LICENSE.md"

[dependencies]
libc = "0.2"

[features]
portable-simd = []
nightly-simd = []
default = []
# Compile les sondes assembleur autonomes (src/hypercomplex/asm_probe.rs)
# utilisées par scripts/asm_spill_check.sh pour compter les spills vectoriels
# AArch64. Hors chemin de compilation normal (build / test / clippy).
asm-probe = ["portable-simd"]

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "hypercomplex_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "reductions_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "fixed_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "transcendental_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "geometry_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "dsp_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "linalg_bench"
harness = false
required-features = ["portable-simd"]

[[bench]]
name = "cnn_bench"
harness = false
required-features = ["portable-simd"]

[[example]]
name = "amx_bench"
required-features = ["nightly-simd"]

[[example]]
name = "qtransformer_bench"
required-features = ["nightly-simd"]
