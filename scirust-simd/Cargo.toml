[package]
name = "scirust-simd"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.89"
authors = ["SciRust Team"]
description = "SIMD auto-vectorization primitives for SciRust"
license-file = "../LICENSE.md"

[dependencies]
scirust-simd-macros = { path = "../scirust-simd-macros" }
libc = "0.2"

[features]
portable-simd = []
nightly-simd = []
default = []

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "hypercomplex_bench"
harness = false
required-features = ["portable-simd"]

[[example]]
name = "amx_bench"
required-features = ["nightly-simd"]

[[example]]
name = "qtransformer_bench"
required-features = ["nightly-simd"]
