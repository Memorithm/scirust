[build]
rustflags = [
    "-Z", "force-unstable-if-unmarked",
    "--extern", "rustc_driver",
    "--extern", "rustc_interface",
    "--extern", "rustc_middle",
    "--extern", "rustc_session",
    "--extern", "rustc_span",
    "--extern", "rustc_ast",
    "--extern", "rustc_hir",
    "--extern", "rustc_index",
    "--extern", "rustc_attr_parsing",
    "--extern", "rustc_data_structures",
    "--extern", "rustc_errors",
    "--extern", "rustc_feature",
    "--extern", "rustc_fluent_macro",
    "--extern", "rustc_graphviz",
    "--extern", "rustc_hash",
    "--extern", "rustc_error_codes",
    "--extern", "rustc_incremental",
    "--extern", "rustc_lexer",
    "--extern", "rustc_lint",
    "--extern", "rustc_macros",
    "--extern", "rustc_metadata",
    "--extern", "rustc_mir_dataflow",
    "--extern", "rustc_mir_transform",
    "--extern", "rustc_parse",
    "--extern", "rustc_passes",
    "--extern", "rustc_plugin_impl",
    "--extern", "rustc_query_system",
    "--extern", "rustc_resolve",
    "--extern", "rustc_serialize",
    "--extern", "rustc_stable_hasher",
    "--extern", "rustc_symbol_mangling",
    "--extern", "rustc_target",
    "--extern", "rustc_trait_selection",
    "--extern", "rustc_type_ir",
]

[env]
RUSTC_SRC = "/root/.rustup/toolchains/nightly-x86_64-unknown-linux-gnu/lib/rustlib/src/rust"
