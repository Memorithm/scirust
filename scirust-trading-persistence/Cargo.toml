[package]
name = "scirust-trading-persistence"
version = "0.1.0"
edition = "2021"

[dependencies]
scirust-trading-core = { path = "../scirust-trading-core" }
scirust-trading-engine = { path = "../scirust-trading-engine" }
rusqlite = { version = "0.32", features = ["bundled", "chrono", "uuid"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
tokio = { version = "1", features = ["sync", "macros", "rt", "rt-multi-thread", "time"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
