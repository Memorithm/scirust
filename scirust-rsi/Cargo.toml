[package]
name = "scirust-rsi"
version = "0.1.0"
edition = "2021"
publish = false
description = "SciRust Recursive Self-Improvement — bounded, sandboxed self-improvement loops (Self-Refine, STaR, Expert Iteration, (1+λ)-ES with the 1/5 rule, Population-Based Training) with explicit safety guards and convergence guarantees"
license-file = "../LICENSE.md"
repository = "https://github.com/Memorithm/scirust"

[dependencies]
rand = "0.8"
rand_distr = "0.4"
serde = { version = "1", features = ["derive"] }
# Optional — only pulled in by the `anthropic` feature (real Claude API generator).
serde_json = { version = "1", optional = true }
ureq = { version = "2", optional = true, features = ["json"] }
rayon = { version = "1", optional = true }

[features]
# Parallel fitness evaluation for the (1+λ)-ES (bit-identical to the sequential
# path; only fitness is parallelised). Off by default.
parallel = ["dep:rayon"]
# Off by default: the core engine stays dependency-light and offline. Enable to
# get `llm::anthropic::ClaudeGenerator`, a `Generator` backed by the Claude
# Messages API (blocking HTTP via ureq).
anthropic = ["dep:ureq", "dep:serde_json"]
# The `scirust-rsi-mcp` server: an MCP (Model Context Protocol) stdio server
# exposing program evolution as a tool an LLM can call. Needs serde_json.
mcp = ["dep:serde_json"]

# MCP server binary — only built when the `mcp` feature is enabled.
[[bin]]
name = "scirust-rsi-mcp"
required-features = ["mcp"]

[dev-dependencies]
serde_json = "1"
# For the `nn_evolution` example: train a real scirust-core ReLU MLP with the
# gradient-free (1+λ)-ES, and compare against a scirust-learning baseline.
scirust-core = { path = "../scirust-core" }
scirust-learning = { path = "../scirust-learning" }
