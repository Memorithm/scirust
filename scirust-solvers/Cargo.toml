[package]
name = "scirust-solvers"
version = "0.1.0"
edition = "2021"
description = "Equation, ODE, optimization and quadrature solvers built on scirust-autodiff"
license = "MIT OR Apache-2.0"
repository = "https://github.com/CHECKUPAUTO/scirust"

[dependencies]
scirust-autodiff = { path = "../scirust-autodiff" }
scirust-symbolic = { path = "../scirust-symbolic" }
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
approx = "0.5"
