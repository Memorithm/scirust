[package]
name = "scirust"
version = "0.14.0"
edition = "2021"
publish = false
rust-version = "1.89"
description = "SciRust — pure-Rust deterministic deep-learning & scientific-computing platform with certifiable industrial verticals (estimation, navigation, water, OT security, functional safety), validated from cloud x86 to embedded ARM (Jetson)"
license-file = "LICENSE.md"
repository = "https://github.com/Memorithm/scirust"

[dependencies]
scirust-core = { path = "scirust-core" }
scirust-simd = { path = "scirust-simd" }
scirust-symbolic = { path = "scirust-symbolic" }
scirust-learning = { path = "scirust-learning" }
scirust-solvers = { path = "scirust-solvers" }
scirust-rsi = { path = "scirust-rsi" }
tokio = { version = "1", features = ["full"], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
chrono = { version = "0.4", features = ["serde"], optional = true }
rand = { version = "0.8", optional = true }
# Used only by the bundled `openclaw-u` demo binary (src/main.rs) to
# integrity-protect its `state.json` with an HMAC-SHA256 tag. Already present
# transitively via scirust-trader, so this adds no new download to the lockfile.
sha2 = { version = "0.10", optional = true }

[features]
default = []
openclaw = ["dep:tokio", "dep:serde", "dep:serde_json", "dep:chrono", "dep:rand", "dep:sha2"]

[dev-dependencies]
rand = "0.8"

# The framework itself is exposed as the `scirust` library (src/lib.rs).
# The bundled autonomous-agent demo (src/main.rs, "OpenClaw-U") is a separate,
# clearly-named binary — it is NOT part of the deep-learning framework.
[[bin]]
name = "openclaw-u"
path = "src/main.rs"
required-features = ["openclaw"]

