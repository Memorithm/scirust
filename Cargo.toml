exclude = [
    "examples/simd_views_demo",
    "examples/benchmarks",
    # Fuzz harness: its own nightly-only workspace (libfuzzer-sys), built only
    # by the dedicated `fuzz` CI job. Never part of the main workspace build.
    "fuzz",
    # Requires `[workspace.dependencies] burn` and the heavy external `burn`
    # crate; kept out of the default workspace build.
    "scirust-burn-bridge",
]
resolver = "2"
