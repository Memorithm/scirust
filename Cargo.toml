[package]
name = "scirust"
version = "0.13.0"
edition = "2024"
description = "SciRust — Industrial-grade deep learning framework in pure Rust"
license = "MIT OR Apache-2.0"
repository = "https://github.com/CHECKUPAUTO/scirust"

[dependencies]
scirust-core = { path = "scirust-core" }
scirust-simd = { path = "scirust-simd" }
scirust-symbolic = { path = "scirust-symbolic" }
scirust-learning = { path = "scirust-learning" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"

[workspace]
members = [
    "examples/mnist_classifier",
    "examples/quickstart_v2",
    "examples/cifar10_classifier",
    "examples/transformer_demo",
    "scirust-macros",
    "scirust-autodiff",
    "scirust-simd-macros",
    "scirust-simd",
    "scirust-gpu",
    "scirust-gpu-macros",
    "scirust-core",
    "scirust-learning",
    "scirust-symbolic",
    "scirust-reasoning",
]
exclude = [
    "soullink-node-patched",
    "scirust-rustc-driver",
    "examples/demo",
    "examples/v2_features_demo",
    "examples/v3_features_demo",
    "examples/v5_features_demo",
    "examples/v6_features_demo",
    "examples/v6_1_features_demo",
    "examples/v7a_mnist_demo",
    "examples/v9_quickstart",
    "examples/v10a_augmented_mnist",
    "examples/v11_pattern_classifier",
    "examples/simd_views_demo",
    "examples/benchmarks",
]
resolver = "3"
