[package]
name = "scirust"
version = "0.13.0"
edition = "2021"
description = "SciRust — Industrial-grade deep learning framework in pure Rust"
license-file = "LICENSE.md"
repository = "https://github.com/CHECKUPAUTO/scirust"

[dependencies]
scirust-core = { path = "scirust-core" }
scirust-simd = { path = "scirust-simd" }
scirust-symbolic = { path = "scirust-symbolic" }
scirust-learning = { path = "scirust-learning" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"

[workspace]
members = [
    "examples/mnist_classifier",
    "examples/quickstart_v2",
    "examples/cifar10_classifier",
    "examples/transformer_demo",
    "examples/transformer_compress",
    "scirust-macros",
    "scirust-autodiff",
    "scirust-simd-macros",
    "scirust-simd",
    "scirust-gpu",
    "scirust-gpu-macros",
    "scirust-core",
    "scirust-runtime",
    "scirust-learning",
    "scirust-symbolic",
    "scirust-symreg",
    "scirust-solvers",
    "scirust-reasoning",
    "scirust-bridge",
    "scirust-evo",
    "scirust-edge",
]
exclude = [
    "scirust-rustc-driver",
    "examples/simd_views_demo",
    "examples/benchmarks",
]
resolver = "2"
