[package]
name = "scirust-neuro-symbolic"
version = "0.1.0"
edition = "2021"
publish = false
description = "Neuro-Symbolic Reasoning engine for SciRust"

[dependencies]
scirust-core = { path = "../scirust-core" }
scirust-symbolic = { path = "../scirust-symbolic" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
log = "0.4"

[dev-dependencies]
rand = "0.8"
